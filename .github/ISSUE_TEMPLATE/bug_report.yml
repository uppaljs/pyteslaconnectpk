name: Bug Report
description: Report a bug in the pyteslaconnectpk library
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **For Home Assistant integration issues, please use [tesla-pakistan-hacs](https://github.com/uppaljs/tesla-pakistan-hacs/issues) instead.**
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Library version
      description: "Output of: pip show pyteslaconnectpk"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: "Output of: python --version"
    validations:
      required: true
